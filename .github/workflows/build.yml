# GitHub Actions Workflow for Tauri App Build
# 本工作流用于自动构建 Tauri 应用并生成 Windows 可执行文件

name: Build Tauri App

# 触发条件配置
on:
  # 推送到 main 分支时触发
  push:
    branches: [main, master]
    # 忽略以下文件的变更，不触发构建
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.github/**'
  
  # 创建 Pull Request 时触发（用于验证构建）
  pull_request:
    branches: [main, master]
  
  # 手动触发（通过 GitHub Actions 页面）
  workflow_dispatch:
    # 手动触发时的输入参数
    inputs:
      release:
        description: '是否创建发布版本'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# 权限配置
permissions:
  contents: write  # 用于上传构建产物和创建 Release

# 任务定义
jobs:
  # Windows 构建任务
  build-windows:
    # 运行环境：Windows Server 2022
    runs-on: windows-latest
    
    # 环境变量
    env:
      # 设置 CI 环境变量，避免 Tauri 交互式提示
      CI: true
    
    # 执行步骤
    steps:
      # 步骤 1: 检出代码
      # 使用 actions/checkout@v4 检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 获取完整的提交历史，用于生成更新日志
          fetch-depth: 0

      # 步骤 2: 安装 pnpm
      # 使用官方 pnpm 安装 Action
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8  # 指定 pnpm 版本
          run_install: false

      # 步骤 3: 安装 Node.js
      # 使用 actions/setup-node@v4 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # 指定 Node.js 版本
          cache: 'pnpm'     # 启用 pnpm 缓存加速

      # 步骤 4: 安装 Rust 工具链
      # 使用 dtolnay/rust-action 安装 Rust
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          # 安装目标平台工具链
          targets: x86_64-pc-windows-msvc

      # 步骤 5: 缓存 Rust 依赖
      # 使用 Swatinem/rust-cache 加速 Rust 构建
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          # 指定工作目录
          workspaces: src-tauri
          # 缓存键前缀
          prefix-key: rust-cache

      # 步骤 6: 安装前端依赖
      # 执行 pnpm install 安装 Node.js 依赖
      - name: Install frontend dependencies
        run: pnpm install

      # 步骤 7: 前端代码类型检查
      # 运行 TypeScript 类型检查确保代码质量
      - name: Type check
        run: pnpm run type-check
        # 即使类型检查失败也继续构建（可选）
        continue-on-error: true

      # 步骤 8: 构建 Tauri 应用
      # 使用 Tauri 官方 GitHub Action 进行构建
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          # GitHub Token，用于上传构建产物
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 项目目录（包含 src-tauri 的目录）
          projectPath: .
          # 包含 tauri.conf.json 的目录
          configPath: src-tauri/tauri.conf.json
          # 构建参数
          args: |
            --target x86_64-pc-windows-msvc
            --bundles msi,nsis

      # 步骤 9: 上传构建产物（Artifacts）
      # 将构建好的文件上传到 GitHub Actions
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          # 产物名称
          name: windows-build
          # 产物路径（使用通配符匹配所有构建输出）
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/ConData.exe
          # 保留天数
          retention-days: 30
          # 如果文件不存在不报错
          if-no-files-found: warn

      # 步骤 10: 创建 Release（仅在手动触发且选择创建发布时）
      - name: Create Release
        if: github.event.inputs.release == 'true' && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          # 自动生成标签名
          tag_name: v${{ github.run_number }}
          # 发布名称
          name: Release v${{ github.run_number }}
          # 发布内容
          body: |
            ## ConData Release v${{ github.run_number }}
            
            ### 下载安装程序
            - **MSI 安装程序**: 推荐大多数用户使用
            - **EXE 安装程序**: 使用 NSIS 打包
            
            ### 安装说明
            1. 下载对应的安装程序
            2. 双击运行安装程序
            3. 按照向导完成安装
            
            ### 系统要求
            - Windows 10/11 64位
            - 无需额外安装运行时
          # 是否为草稿
          draft: true
          # 是否为预发布
          prerelease: false
          # 上传的文件
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 构建状态通知（可选）
  notify:
    # 依赖于 build-windows 任务
    needs: build-windows
    # 无论构建成功或失败都执行
    if: always()
    runs-on: ubuntu-latest
    steps:
      # 输出构建结果
      - name: Build status
        run: |
          if [ "${{ needs.build-windows.result }}" == "success" ]; then
            echo "✅ Windows 构建成功！"
          else
            echo "❌ Windows 构建失败！"
            exit 1
          fi
        shell: bash
